openapi: "3.1.0"

info:
  title: Auris — Audio Ear-Training App
  description: |
    Auris is a client-side SvelteKit app for training audio ears. It plays bundled
    audio samples with Web Audio API effects (gain, EQ, panning, compression) and
    asks the user to identify what changed. Scores persist in localStorage.

    NOTE: This is a frontend-only SPA with no backend. "Paths" describe SvelteKit
    routes. "Schemas" describe TypeScript interfaces used throughout the app.
    There are no HTTP endpoints.
  version: "1.0.0"
  contact:
    name: Sound Engineer
  license:
    name: Private

# No servers — pure static SPA
servers: []

# SvelteKit routes (client-side navigation only)
paths:
  /:
    get:
      summary: Dashboard
      description: Home page showing all four module cards with progress and overall stats.
      x-route-file: src/routes/+page.svelte
      x-layout: src/routes/+layout.svelte

  /exercise/decibel:
    get:
      summary: Decibel Training Exercise
      description: Exercise page for identifying dB changes between dry and processed audio.
      x-route-file: src/routes/exercise/decibel/+page.svelte
      x-layout: src/routes/exercise/+layout.svelte

  /exercise/eq:
    get:
      summary: EQ Training Exercise
      description: Exercise page for identifying EQ frequency and gain changes.
      x-route-file: src/routes/exercise/eq/+page.svelte
      x-layout: src/routes/exercise/+layout.svelte

  /exercise/panning:
    get:
      summary: Panning Training Exercise
      description: Exercise page for identifying stereo pan position.
      x-route-file: src/routes/exercise/panning/+page.svelte
      x-layout: src/routes/exercise/+layout.svelte

  /exercise/compression:
    get:
      summary: Compression Training Exercise
      description: Exercise page for identifying compression settings.
      x-route-file: src/routes/exercise/compression/+page.svelte
      x-layout: src/routes/exercise/+layout.svelte

# Global TypeScript schemas shared across all features
components:
  schemas:

    Difficulty:
      type: string
      enum: [easy, medium, hard]
      description: Training difficulty level. Controls parameter ranges and tolerances.

    ModuleId:
      type: string
      enum: [decibel, eq, panning, compression]
      description: Identifies one of the four exercise modules.

    Exercise:
      type: object
      description: A single generated exercise instance.
      required: [id, module, difficulty, sampleId, timestamp, params, question, correctAnswer]
      properties:
        id:
          type: string
          description: UUID generated by crypto.randomUUID()
        module:
          $ref: "#/components/schemas/ModuleId"
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        sampleId:
          type: string
          description: Filename of the audio sample (e.g. "pink-noise.mp3")
        timestamp:
          type: integer
          description: Unix timestamp in ms when exercise was created
        params:
          oneOf:
            - $ref: "#/components/schemas/DecibelParams"
            - $ref: "#/components/schemas/EQParams"
            - $ref: "#/components/schemas/PanningParams"
            - $ref: "#/components/schemas/CompressionParams"
        question:
          type: string
          description: Human-readable question shown to the user
        correctAnswer:
          $ref: "#/components/schemas/AnswerValue"

    DecibelParams:
      type: object
      required: [type, gainDb]
      properties:
        type:
          type: string
          enum: [decibel]
        gainDb:
          type: number
          description: Gain applied in dB (positive = boost, negative = cut)

    EQParams:
      type: object
      required: [type, frequencyHz, gainDb, Q]
      properties:
        type:
          type: string
          enum: [eq]
        frequencyHz:
          type: number
          description: Center frequency of the peaking EQ band in Hz
        gainDb:
          type: number
          description: Boost or cut in dB
        Q:
          type: number
          description: Bandwidth factor. Higher Q = narrower band.

    PanningParams:
      type: object
      required: [type, pan]
      properties:
        type:
          type: string
          enum: [panning]
        pan:
          type: number
          minimum: -1
          maximum: 1
          description: Pan position. -1 = full left, 0 = center, 1 = full right.

    CompressionParams:
      type: object
      required: [type, threshold, ratio, knee, attack, release]
      properties:
        type:
          type: string
          enum: [compression]
        threshold:
          type: number
          description: Threshold in dB (typically -40 to 0)
        ratio:
          type: number
          description: Compression ratio (1:1 to 20:1)
        knee:
          type: number
          description: Knee width in dB (0-40)
        attack:
          type: number
          description: Attack time in seconds (0-1)
        release:
          type: number
          description: Release time in seconds (0-1)

    AnswerValue:
      description: Union of all possible answer shapes, one per module.
      oneOf:
        - type: object
          required: [type, gainDb]
          properties:
            type: { type: string, enum: [decibel] }
            gainDb: { type: number }
        - type: object
          required: [type, frequencyHz, gainDb]
          properties:
            type: { type: string, enum: [eq] }
            frequencyHz: { type: number }
            gainDb: { type: number }
            boostOrCut: { type: string, enum: [boost, cut] }
        - type: object
          required: [type, pan]
          properties:
            type: { type: string, enum: [panning] }
            pan: { type: number }
        - type: object
          required: [type]
          properties:
            type: { type: string, enum: [compression] }
            threshold: { type: number }
            ratio: { type: number }
            detected: { type: boolean }

    AnswerResult:
      type: object
      description: Graded result returned by evaluateAnswer()
      required: [correct, accuracy, exerciseId, userAnswer, correctAnswer, points]
      properties:
        correct:
          type: boolean
          description: Whether answer was within acceptable tolerance
        accuracy:
          type: number
          minimum: 0
          maximum: 1
          description: How close to correct. 1 = perfect, 0 = completely wrong.
        exerciseId:
          type: string
        userAnswer:
          $ref: "#/components/schemas/AnswerValue"
        correctAnswer:
          $ref: "#/components/schemas/AnswerValue"
        points:
          type: integer
          description: Points earned. Formula — round(basePoints * accuracy + streakBonus)

    ModuleScore:
      type: object
      description: Persistent score state for one exercise module.
      required: [moduleId, totalAttempts, correctAttempts, currentStreak, bestStreak, totalPoints, history, perDifficulty]
      properties:
        moduleId:
          $ref: "#/components/schemas/ModuleId"
        totalAttempts:
          type: integer
        correctAttempts:
          type: integer
        currentStreak:
          type: integer
        bestStreak:
          type: integer
        totalPoints:
          type: integer
        history:
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/SessionRecord"
        perDifficulty:
          type: object
          description: Per-difficulty breakdown
          additionalProperties:
            type: object
            properties:
              attempts: { type: integer }
              correct: { type: integer }

    SessionRecord:
      type: object
      required: [timestamp, difficulty, attempts, correct, points]
      properties:
        timestamp: { type: integer }
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        attempts: { type: integer }
        correct: { type: integer }
        points: { type: integer }

    AurisState:
      type: object
      description: Full localStorage state. Stored under key "auris_state".
      required: [version, modules, settings]
      properties:
        version:
          type: integer
          description: Schema version for migration. Start at 1.
        modules:
          type: object
          description: One ModuleScore per module ID
          additionalProperties:
            $ref: "#/components/schemas/ModuleScore"
        settings:
          $ref: "#/components/schemas/UserSettings"

    UserSettings:
      type: object
      required: [masterVolume, preferredSample, difficulties, autoAdvanceDifficulty]
      properties:
        masterVolume:
          type: number
          minimum: 0
          maximum: 1
          default: 0.8
        preferredSample:
          type: string
          default: "pink-noise.mp3"
          description: Filename of the currently selected audio sample
        difficulties:
          type: object
          description: Per-module difficulty setting
          additionalProperties:
            $ref: "#/components/schemas/Difficulty"
        autoAdvanceDifficulty:
          type: boolean
          default: false
          description: Whether to show advancement suggestion at 80% accuracy over 10 attempts

# Audio samples bundled in static/samples/
x-audio-samples:
  - id: pink-noise
    file: pink-noise.mp3
    description: 10s pink noise — ideal for EQ training
    duration: 10
    channels: stereo
  - id: drums-loop
    file: drums-loop.mp3
    description: 8-bar drum loop at 120 BPM — transients for compression, panning
    duration: ~16
    channels: stereo
  - id: guitar-loop
    file: guitar-loop.mp3
    description: 8-bar melodic loop — harmonic content for EQ training
    duration: ~16
    channels: stereo
  - id: speech-male
    file: speech-male.mp3
    description: 10-15s male speech — familiar reference material
    duration: 12
    channels: mono
  - id: speech-female
    file: speech-female.mp3
    description: 10-15s female speech — different frequency profile
    duration: 12
    channels: mono

# localStorage
x-storage:
  key: auris_state
  schema-version: 1
  type: AurisState

# Build config
x-tech-stack:
  framework: SvelteKit
  svelte-version: 5
  typescript: true
  css: Tailwind CSS
  adapter: adapter-static
  ssr: false
  audio-api: Web Audio API
