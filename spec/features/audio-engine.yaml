feature:
  name: audio-engine
  title: Audio Engine
  description: |
    Core audio infrastructure for the entire app. Manages a single AudioContext lifecycle,
    loads and caches bundled MP3 samples, and provides A/B playback with pluggable effect
    chains. All four exercise modules depend on this feature.
  priority: 1
  phase: audio-core

user-stories:
  - id: US-audio-engine-01
    as: sound engineer
    i-want: to hear a dry (unprocessed) audio sample
    so-that: I have a clean reference before identifying changes
    acceptance-criteria:
      - Clicking Play starts audio playback from the beginning of the sample
      - Audio loops seamlessly until stopped
      - Clicking Stop halts playback immediately with no audible click
      - Audio context is created on first user gesture (not on page load)

  - id: US-audio-engine-02
    as: sound engineer
    i-want: to toggle between the original (A) and processed (B) audio instantly
    so-that: I can compare the two versions and identify the change
    acceptance-criteria:
      - A button plays the sample with no effect applied
      - B button plays the sample with the current exercise effect applied
      - Switching A/B stops and restarts playback with no audible click
      - The active mode (A or B) is visually indicated

  - id: US-audio-engine-03
    as: sound engineer
    i-want: to control the playback volume
    so-that: I can listen at a comfortable level
    acceptance-criteria:
      - A master volume control adjusts output gain from 0 to 1
      - Volume change is immediately audible without restarting playback
      - Volume persists in settings between sessions

  - id: US-audio-engine-04
    as: sound engineer
    i-want: to choose which audio sample is used for the exercise
    so-that: I can train with material that matches my work context
    acceptance-criteria:
      - User can select from 5 bundled samples
      - Changing the sample during playback stops current audio and reloads
      - Sample preference persists in settings between sessions

stores:
  - name: engine.svelte.ts
    location: src/lib/audio/
    exports:
      - name: audioEngine
        type: AudioEngine (object with reactive state + methods)
        description: Singleton engine instance. Reactive state via $state.
      - name: isPlaying
        type: boolean
        description: Whether audio is currently playing
      - name: currentMode
        type: "'A' | 'B'"
        description: Which mode is active in A/B comparison
      - name: isLoaded
        type: boolean
        description: Whether all samples have been decoded and cached
      - name: play
        type: "(sampleId: string) => void"
        description: Play a sample dry (no effect)
      - name: playWithEffect
        type: "(sampleId: string, buildEffect: (ctx: AudioContext) => AudioNode) => void"
        description: Play a sample with an effect chain applied
      - name: stop
        type: "() => void"
        description: Stop current playback with 5ms gain ramp to prevent clicks
      - name: toggleAB
        type: "(sampleId: string, buildEffect: (ctx: AudioContext) => AudioNode) => void"
        description: Toggle between A (dry) and B (processed) playback
      - name: setVolume
        type: "(value: number) => void"
        description: Set master gain. Value 0-1.
      - name: loadSamples
        type: "(sampleIds: string[]) => Promise<void>"
        description: Fetch and decode all samples into the buffer cache
    persisted: false

  - name: effects.svelte.ts
    location: src/lib/audio/
    exports:
      - name: createGainEffect
        type: "(ctx: AudioContext, gainDb: number) => GainNode"
        description: Creates a GainNode with linear gain set from dB value
      - name: createEQEffect
        type: "(ctx: AudioContext, frequencyHz: number, gainDb: number, Q: number) => BiquadFilterNode"
        description: Creates a peaking BiquadFilterNode
      - name: createPanEffect
        type: "(ctx: AudioContext, pan: number) => StereoPannerNode"
        description: Creates a StereoPannerNode with pan.value set
      - name: createCompressorEffect
        type: "(ctx: AudioContext, params: CompressionParams) => AudioNode"
        description: Creates DynamicsCompressorNode with makeup GainNode. Returns the output node.
    persisted: false

  - name: utils.ts
    location: src/lib/audio/
    exports:
      - name: dbToLinear
        type: "(db: number) => number"
        description: Converts dB to linear gain. Math.pow(10, db / 20)
      - name: linearToDb
        type: "(linear: number) => number"
        description: Converts linear gain to dB. 20 * Math.log10(linear)
      - name: randomInRange
        type: "(min: number, max: number, step?: number) => number"
        description: Returns a random number in range, optionally snapped to step
      - name: randomChoice
        type: "<T>(array: T[]) => T"
        description: Returns a random element from an array
      - name: clamp
        type: "(value: number, min: number, max: number) => number"
        description: Clamps a value between min and max
    persisted: false

schemas: []  # All schemas are in openapi.yaml base spec

routes: []  # Audio engine has no routes of its own

dependencies:
  features: []
  npm: []

x-design-status: pending
x-build-status: pending
x-qa-status: pending
