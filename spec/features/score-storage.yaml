feature:
  name: score-storage
  title: Score Storage & Persistence
  description: |
    Reactive state management for scores, streaks, and user settings. All state is
    automatically persisted to localStorage under the key "auris_state". Provides
    the scoring formula, streak tracking, and per-module progress aggregation used
    by all exercise modules and the dashboard.
  priority: 2
  phase: storage

user-stories:
  - id: US-score-storage-01
    as: sound engineer
    i-want: my scores to persist between browser sessions
    so-that: I can track my progress over time
    acceptance-criteria:
      - After submitting an answer, the score is saved to localStorage
      - Refreshing the page restores all score data correctly
      - If localStorage contains no data, the app initializes with zero scores
      - If localStorage schema version is outdated, migration runs without data loss

  - id: US-score-storage-02
    as: sound engineer
    i-want: to see my current streak and best streak per module
    so-that: I am motivated to keep practicing
    acceptance-criteria:
      - Streak increments by 1 when accuracy >= 0.8
      - Streak resets to 0 when accuracy < 0.5
      - Best streak is updated whenever current streak exceeds it
      - Streak is tracked independently per module

  - id: US-score-storage-03
    as: sound engineer
    i-want: to earn more points for harder exercises answered correctly
    so-that: I am rewarded for pushing my limits
    acceptance-criteria:
      - Easy correct answer earns up to 10 base points
      - Medium correct answer earns up to 20 base points
      - Hard correct answer earns up to 30 base points
      - Streak bonus adds min(streak, 10) * 2 points
      - Points scale continuously with accuracy (not binary correct/wrong)
      - Total points accumulate in the module score

  - id: US-score-storage-04
    as: sound engineer
    i-want: my difficulty preference per module to be remembered
    so-that: I do not have to reset it on every visit
    acceptance-criteria:
      - Changing difficulty for a module persists immediately
      - Difficulty is restored per module on next visit
      - Master volume persists between sessions
      - Preferred audio sample persists between sessions

stores:
  - name: scores.svelte.ts
    location: src/lib/stores/
    exports:
      - name: scores
        type: "{ modules: Record<ModuleId, ModuleScore> }"
        description: Reactive object. All properties are $state. Auto-persists via $effect.
      - name: recordAnswer
        type: "(result: AnswerResult) => void"
        description: |
          Updates the module score after an exercise. Increments attempts,
          updates correct count, recalculates streak, adds to history,
          adds points. Triggers localStorage persist.
      - name: getModuleScore
        type: "(moduleId: ModuleId) => ModuleScore"
        description: Returns current score for a module. Initializes to zero if not found.
      - name: resetModule
        type: "(moduleId: ModuleId) => void"
        description: Resets all stats for a module to zero. Useful for testing.
      - name: getAccuracy
        type: "(moduleId: ModuleId, difficulty?: Difficulty) => number"
        description: |
          Returns accuracy (0-1) for a module. If difficulty provided, returns
          accuracy for that difficulty tier only.
      - name: getLastNAccuracy
        type: "(moduleId: ModuleId, n: number) => number"
        description: Returns accuracy over the last N attempts for difficulty progression logic.
    persisted: true
    persistence-key: auris_state

  - name: settings.svelte.ts
    location: src/lib/stores/
    exports:
      - name: settings
        type: UserSettings
        description: Reactive settings object. Auto-persists via $effect.
      - name: setVolume
        type: "(value: number) => void"
        description: Sets masterVolume (0-1)
      - name: setDifficulty
        type: "(moduleId: ModuleId, difficulty: Difficulty) => void"
        description: Sets difficulty for a specific module
      - name: setPreferredSample
        type: "(sampleId: string) => void"
        description: Sets the preferred audio sample
      - name: setAutoAdvance
        type: "(value: boolean) => void"
        description: Toggles auto-advance difficulty suggestion
    persisted: true
    persistence-key: auris_state

schemas:
  - name: ModuleScore
    location: src/lib/exercises/types.ts
    fields:
      - name: moduleId
        type: ModuleId
        required: true
        description: Which module this score belongs to
      - name: totalAttempts
        type: number
        required: true
        description: Total exercises attempted
      - name: correctAttempts
        type: number
        required: true
        description: Total exercises answered within tolerance
      - name: currentStreak
        type: number
        required: true
        description: Current consecutive accurate answers
      - name: bestStreak
        type: number
        required: true
        description: All-time best streak for this module
      - name: totalPoints
        type: number
        required: true
        description: Cumulative points earned
      - name: history
        type: SessionRecord[]
        required: true
        description: Last 50 session records
      - name: perDifficulty
        type: "Record<Difficulty, { attempts: number; correct: number }>"
        required: true
        description: Per-difficulty attempt and correct counts

  - name: AurisState
    location: src/lib/exercises/types.ts
    fields:
      - name: version
        type: number
        required: true
        description: Schema version. Initialize to 1.
      - name: modules
        type: "Record<ModuleId, ModuleScore>"
        required: true
        description: One score entry per module
      - name: settings
        type: UserSettings
        required: true
        description: User preferences

routes: []

dependencies:
  features: []
  npm: []

x-design-status: pending
x-build-status: pending
x-qa-status: pending
