feature:
  name: eq-training
  title: EQ Training Exercise
  description: |
    Exercise module for identifying EQ changes. Applies a parametric peaking filter
    to the audio sample at a random frequency. On easy difficulty, user identifies
    the frequency band only. On medium, also identifies boost or cut. On hard,
    also identifies the approximate gain amount.
  priority: 4
  phase: exercise

user-stories:
  - id: US-eq-01
    as: sound engineer
    i-want: to hear a frequency change and identify where in the spectrum it is
    so-that: I develop frequency recognition
    acceptance-criteria:
      - A plays the sample dry (no EQ)
      - B plays the sample with a peaking EQ applied at a random frequency
      - The user selects a frequency band from a visual frequency picker
      - On easy, only frequency selection is required
      - On medium, user also selects boost or cut
      - On hard, user also estimates the gain amount via a slider
      - Submitting shows correct frequency, whether boost/cut, and gain amount
      - Correct answer is within tolerance for the current difficulty

  - id: US-eq-02
    as: sound engineer
    i-want: difficulty to control available frequency bands and gain precision
    so-that: I can progressively challenge myself
    acceptance-criteria:
      - Easy: 3 bands [250Hz, 1kHz, 4kHz], gain ±6dB, Q=1.0 (wide), identify freq only, tolerance ±1 band
      - Medium: 7 bands [125, 250, 500, 1k, 2k, 4k, 8k Hz], gain ±6dB, Q=2.0, identify freq + boost/cut
      - Hard: same 7 bands, gain ±3 to ±9dB, Q=4.0 (narrow), identify freq + boost/cut + gain (±3dB tolerance)

  - id: US-eq-03
    as: sound engineer
    i-want: to see the correct EQ parameters after answering
    so-that: I learn the relationships between frequency and sound character
    acceptance-criteria:
      - Feedback shows the exact frequency applied (e.g. "1 kHz")
      - Feedback shows whether it was a boost or cut
      - On hard, feedback shows the exact dB amount
      - Feedback shows my answer for comparison

components:
  - name: FrequencyPicker.svelte
    location: src/lib/components/
    props:
      - name: bands
        type: "number[]"
        required: true
        description: Available frequency values in Hz to display as buttons (e.g. [250, 1000, 4000])
      - name: selectedFrequency
        type: "number | null"
        required: true
        description: Currently selected frequency in Hz, or null if none selected
      - name: showBoostCut
        type: boolean
        required: true
        description: Whether to show the boost/cut toggle (medium+)
      - name: boostOrCut
        type: "'boost' | 'cut' | null"
        required: false
        description: Selected boost/cut direction
      - name: showGain
        type: boolean
        required: true
        description: Whether to show the gain slider (hard only)
      - name: gainDb
        type: number
        required: false
        description: Current gain slider value in dB
      - name: disabled
        type: boolean
        required: false
        description: Disables all picker controls (post-submit)
    events:
      - name: selectFrequency
        payload: number
        description: Fires when a frequency band is clicked
      - name: selectBoostCut
        payload: "'boost' | 'cut'"
        description: Fires when boost or cut is toggled
      - name: gainChange
        payload: number
        description: Fires when gain slider value changes
    description: |
      Grid of frequency band buttons styled like a spectrum display. Shows Hz labels.
      Optionally shows boost/cut toggle and gain slider below the grid.
      Active selection is highlighted with accent color.

stores:
  - name: eq.svelte.ts
    location: src/lib/exercises/
    exports:
      - name: generateExercise
        type: "(difficulty: Difficulty, sampleId?: string) => Exercise"
        description: |
          Generates a random EQ exercise. Picks frequency from difficulty band list,
          random gain within difficulty range, Q from difficulty config.
      - name: evaluateAnswer
        type: "(exercise: Exercise, userAnswer: { frequencyHz: number; boostOrCut?: 'boost' | 'cut'; gainDb?: number }) => AnswerResult"
        description: |
          Grades the EQ answer. On easy: correct if frequency band matches.
          On medium: also checks boost/cut direction.
          On hard: also checks gain within ±3dB tolerance.
      - name: DIFFICULTY_CONFIG
        type: "Record<Difficulty, { bands: number[], gainRange: [number, number], Q: number, requireBoostCut: boolean, requireGain: boolean, gainTolerance: number }>"
        description: |
          Easy: { bands: [250, 1000, 4000], gainRange: [-6, 6], Q: 1.0, requireBoostCut: false, requireGain: false }
          Medium: { bands: [125, 250, 500, 1000, 2000, 4000, 8000], gainRange: [-6, 6], Q: 2.0, requireBoostCut: true, requireGain: false }
          Hard: { bands: [125, 250, 500, 1000, 2000, 4000, 8000], gainRange: [-9, 9], Q: 4.0, requireBoostCut: true, requireGain: true, gainTolerance: 3 }
    persisted: false

routes:
  - path: /exercise/eq
    file: src/routes/exercise/eq/+page.svelte
    description: |
      EQ training exercise page. Composes AudioTransport, FrequencyPicker,
      FeedbackOverlay, ScoreDisplay, DifficultySelector. Adapts FrequencyPicker
      controls based on current difficulty.

dependencies:
  features:
    - audio-engine
    - score-storage
    - decibel-training
  npm: []

x-design-status: pending
x-build-status: pending
x-qa-status: pending
