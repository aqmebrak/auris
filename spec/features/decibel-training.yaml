feature:
  name: decibel-training
  title: Decibel Training Exercise
  description: |
    The first and foundational exercise module. Plays a dry sample (A) and a sample
    with a gain change applied (B). The user guesses the dB difference between them.
    This module proves the full exercise loop and is the template for all other modules.
  priority: 3
  phase: exercise

user-stories:
  - id: US-decibel-01
    as: sound engineer
    i-want: to hear two audio versions and identify the volume difference in dB
    so-that: I develop sensitivity to level changes
    acceptance-criteria:
      - A new exercise is generated with a random dB change within the difficulty range
      - A plays the sample at 0dB (dry reference)
      - B plays the sample with the exercise dB change applied
      - The user can toggle between A and B freely before answering
      - A slider allows the user to input a dB value answer
      - Submitting the answer shows whether it was within the tolerance
      - The correct answer is revealed in the feedback overlay
      - A "Next" button generates a new exercise

  - id: US-decibel-02
    as: sound engineer
    i-want: difficulty to control the range and precision of dB changes
    so-that: I can progressively challenge myself
    acceptance-criteria:
      - Easy: dB change is one of [+3, +6, -3, -6], tolerance ±2dB
      - Medium: dB change in range [-6, +6] in 1dB steps (excluding 0), tolerance ±1dB
      - Hard: dB change in range [-6, +6] in 0.5dB steps (excluding 0), tolerance ±0.5dB
      - Difficulty setting persists between visits

  - id: US-decibel-03
    as: sound engineer
    i-want: to see my score and streak update after each answer
    so-that: I can track my improvement in real-time
    acceptance-criteria:
      - Score display updates immediately after submitting
      - Streak is shown and updates correctly
      - Answer within tolerance increments streak
      - Answer outside tolerance resets streak

components:
  - name: AudioTransport.svelte
    location: src/lib/components/
    props:
      - name: isPlaying
        type: boolean
        required: true
        description: Whether audio is currently playing
      - name: currentMode
        type: "'A' | 'B'"
        required: true
        description: Active A/B mode
      - name: disabled
        type: boolean
        required: false
        description: Disables all controls (e.g. while loading)
    events:
      - name: play
        payload: void
        description: Fires when Play button is pressed
      - name: stop
        payload: void
        description: Fires when Stop button is pressed
      - name: selectA
        payload: void
        description: Fires when A button is pressed
      - name: selectB
        payload: void
        description: Fires when B button is pressed
    description: Transport controls — Play/Stop button and A/B toggle. Purely presentational. No audio logic.

  - name: AnswerSlider.svelte
    location: src/lib/components/
    props:
      - name: min
        type: number
        required: true
        description: Minimum slider value
      - name: max
        type: number
        required: true
        description: Maximum slider value
      - name: step
        type: number
        required: true
        description: Slider step increment
      - name: unit
        type: string
        required: true
        description: Unit label shown next to value (e.g. "dB", "%")
      - name: label
        type: string
        required: true
        description: Accessible label for the slider
      - name: value
        type: number
        required: true
        description: Bindable current value
      - name: disabled
        type: boolean
        required: false
        description: Disables slider interaction (post-submit)
    events:
      - name: change
        payload: number
        description: Fires on value change
    description: Styled range input with numeric readout and unit. Used for dB and panning answers.

  - name: FeedbackOverlay.svelte
    location: src/lib/components/
    props:
      - name: result
        type: AnswerResult
        required: true
        description: The graded result to display
      - name: visible
        type: boolean
        required: true
        description: Whether the overlay is shown
    events:
      - name: next
        payload: void
        description: Fires when the Next button is clicked
    description: |
      Shown after answer submission. Displays correct/incorrect, the right answer,
      user's answer, and points earned. Green for correct, red for incorrect.

  - name: ScoreDisplay.svelte
    location: src/lib/components/
    props:
      - name: moduleId
        type: ModuleId
        required: true
        description: Which module score to show
    events: []
    description: Shows current score, streak, and accuracy for a module. Reads from scores store.

  - name: DifficultySelector.svelte
    location: src/lib/components/
    props:
      - name: moduleId
        type: ModuleId
        required: true
        description: Which module this selector controls
      - name: value
        type: Difficulty
        required: true
        description: Currently selected difficulty
    events:
      - name: change
        payload: Difficulty
        description: Fires when difficulty changes
    description: Three-button toggle for Easy / Medium / Hard. Styled like a hardware selector.

stores:
  - name: decibel.svelte.ts
    location: src/lib/exercises/
    exports:
      - name: generateExercise
        type: "(difficulty: Difficulty, sampleId?: string) => Exercise"
        description: |
          Generates a random decibel exercise. Picks a gainDb within difficulty
          range, constructs the Exercise object with correct answer.
      - name: evaluateAnswer
        type: "(exercise: Exercise, userAnswer: number) => AnswerResult"
        description: |
          Grades the user's dB guess against the correct answer.
          Accuracy = max(0, 1 - abs(user - correct) / tolerance).
      - name: DIFFICULTY_CONFIG
        type: "Record<Difficulty, { values: number[], tolerance: number }>"
        description: |
          Easy: { values: [3, 6, -3, -6], tolerance: 2 }
          Medium: { values: [-6..+6 in 1dB steps, excl. 0], tolerance: 1 }
          Hard: { values: [-6..+6 in 0.5dB steps, excl. 0], tolerance: 0.5 }
    persisted: false

routes:
  - path: /exercise/decibel
    file: src/routes/exercise/decibel/+page.svelte
    description: |
      Full exercise page for decibel training. Composes AudioTransport,
      AnswerSlider, FeedbackOverlay, ScoreDisplay, DifficultySelector.
      Drives the full exercise loop: generate → play → answer → evaluate → persist → next.

dependencies:
  features:
    - audio-engine
    - score-storage
  npm: []

x-design-status: pending
x-build-status: pending
x-qa-status: pending
